<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>funcoes em Javascript</title>
</head>
<body>
    <script>
        // funcao .... 
        // com parametros ....
        function nome_funcao(a, b, c) {
            // escrever codigo
            return a;
        }
        //chama a funcao
        nome_funcao(1, 4, 2);
        //chama a funcao nome_funcao novamente
        nome_funcao(6, 3, 9);
        // chama a funca novamente
        nome_funcao (8,1,5);
    </script>
</body>
</html>
