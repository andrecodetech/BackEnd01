<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //funcao de soma
        function soma(a, b) {
            return a + b;
        }

        // funcao de subtracao
        function subtracao (a, b) {
            return a-b;
        }

        // funcao de multiplicacao
        function multiplicacao (a, b) {
            return a * b;
        } 

        // divisao
        function divisao (a, b) {
            return  a/b;
        }

        // utilizado as funcoes
        let s1 = soma (4, 7);
        let s2 = subtracao(8, 1);
        let s3 = divisao(s1,s2);
        let s4 = multiplicacao(s1, s2);

        document.write("s1: " + s1 + "<br>");
        document.write("s2: " + s2 + "<br>");
        document.write("s3: " + s3 + "<br>");
        document.write("s4: " + s4 + "<br>");

    </script>
</head>
<body>
    
</body>
</html>
