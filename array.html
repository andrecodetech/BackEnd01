<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array dde Carros</title>
</head>
<body>
    <script >
        // declaração do carro
        const carros = ["Jetta", "Civic", "Byd"];

        // loop carros
        for(let car in carros) {
            // 
            document.write("<br>Carro: " + car);
        }
    </script>
</body>
</html>
